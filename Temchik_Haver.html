<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Temchik_Haver</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 35px 25px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 25px 80px rgba(0,0,0,0.6);
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 16px;
            border: 3px solid rgba(255,255,255,0.15);
            box-shadow: 0 8px 30px rgba(245, 87, 108, 0.3);
            overflow: hidden;
            background: #302b63;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(270deg, #f093fb, #f5576c, #f093fb, #f5576c);
            background-size: 400% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 8s ease-in-out infinite;
            margin-bottom: 4px;
        }
        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            margin: 16px 0;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 16px 0 20px;
        }
        .btn {
            display: inline-block;
            padding: 14px 20px;
            background: rgba(255,255,255,0.06);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: pointer;
            letter-spacing: 0.3px;
            width: 100%;
            text-align: center;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-default {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.06);
        }
        .btn-default:active {
            background: rgba(255,255,255,0.1);
        }
        .btn-active {
            background: linear-gradient(135deg, #f093fb, #f5576c) !important;
            border: none !important;
            font-weight: 600 !important;
            box-shadow: 0 4px 20px rgba(245, 87, 108, 0.3) !important;
        }
        .btn-story {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border: none;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(245, 87, 108, 0.3);
        }
        .btn-story:active {
            opacity: 0.85;
            transform: scale(0.97);
        }
        .story-wrapper {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease, margin 0.3s ease;
            opacity: 0;
            margin: 0;
        }
        .story-wrapper.open {
            max-height: 500px;
            opacity: 1;
            margin: 12px 0 16px;
        }
        .story-text {
            background: rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 20px;
            text-align: left;
            font-size: 14px;
            line-height: 1.8;
            color: rgba(255,255,255,0.85);
            border: 1px solid rgba(255,255,255,0.06);
            white-space: pre-line;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.5px;
            transform: translateY(-10px);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .story-wrapper.open .story-text {
            transform: translateY(0);
        }
        .footer {
            margin-top: 16px;
            font-size: 11px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 0.5px;
        }
        .btn-wrapper {
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">
            <img src="https://i.postimg.cc/Qx4DTtv5/IMG-20260627-014129.jpg" alt="Temchik_Haver">
        </div>
        <h1>Temchik_Haver</h1>

        <div class="divider"></div>

        <div class="links">
            <button class="btn btn-default" onclick="handleClick(this, 'https://forum.blessrussia.online/index.php?members=48813/')">Форумный Аккаунт</button>
            <button class="btn btn-default" onclick="handleClick(this, 'https://www.tiktok.com/@temchikhaver')">TikTok</button>
            <button class="btn btn-default" onclick="handleClick(this, 'https://vk.ru/ianconno')">VK</button>
            <button class="btn btn-story" onclick="toggleStory(this)">Моя история</button>
        </div>

        <div id="storyWrapper" class="story-wrapper">
            <div id="story" class="story-text">
📌 Мл.Модератор [3lvl]
12.06.2026 - 16.06.2026

📌 Модератор [4lvl]
16.06.2026 - 22.06.2026

📌 Ст. Модератор [5lvl]
22.06.2026 - 28.06.2026

📌 Куратор Форума
26.06.2026 - 01.07.2026 [ПСЖ]

📌 Мл. Администратор [6lvl]
28.06.2026 - 01.07.2026 [ПСЖ]
            </div>
        </div>

        <div class="footer">Telegram Mini App</div>
    </div>

    <script>
        if (window.Telegram && Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
        }

        let activeButton = null;

        function handleClick(btn, url) {
            if (activeButton && activeButton !== btn) {
                activeButton.classList.remove('btn-active');
                activeButton = null;
            }
            
            if (btn.classList.contains('btn-active')) {
                btn.classList.remove('btn-active');
                activeButton = null;
            } else {
                btn.classList.add('btn-active');
                activeButton = btn;
            }

            if (window.Telegram && Telegram.WebApp) {
                Telegram.WebApp.openLink(url);
            } else {
                window.open(url, '_blank');
            }
        }

        function toggleStory(btn) {
            const wrapper = document.getElementById('storyWrapper');
            const isOpen = wrapper.classList.contains('open');
            
            if (isOpen) {
                wrapper.classList.remove('open');
                btn.textContent = 'Моя история';
            } else {
                if (activeButton) {
                    activeButton.classList.remove('btn-active');
                    activeButton = null;
                }
                wrapper.classList.add('open');
                btn.textContent = 'Скрыть историю';
            }
        }
    </script>
</body>
</html>
